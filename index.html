<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модератор Заголовков Яндекс Директ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">
    <div class="max-w-[1600px] mx-auto p-4 sm:p-6 lg:p-8">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-2xl shadow-xs border border-slate-100">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">
                    <i data-lucide="layers" class="text-indigo-600 w-7 h-7"></i>
                    Анализ потери дополнительных заголовков в Яндекс Директе
                </h1>
                <p class="text-sm text-slate-500 mt-1">Проверка склейки первого и второго заголовков при обновлении текстово-графических объявлений до комбинаторных</p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <label for="excelFile" class="bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-5 rounded-xl transition-all flex items-center gap-2 text-sm shadow-md cursor-pointer active:scale-98 w-full md:w-auto justify-center">
                    <i data-lucide="file-up" class="w-4 h-4"></i>
                    <span id="uploadText">Загрузить файл</span>
                    <input type="file" id="excelFile" accept=".xlsx, .xls, .csv" class="hidden">
                </label>
                <button id="downloadFileBtn" disabled class="bg-slate-200 text-slate-400 font-medium py-3 px-5 rounded-xl transition-all flex items-center gap-2 text-sm shadow-xs border border-slate-300/50 cursor-not-allowed w-full md:w-auto justify-center">
                    <i data-lucide="download" class="w-4 h-4"></i>
                    Скачать результат
                </button>
            </div>
        </header>

        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs flex items-center gap-4">
                <div class="p-3 rounded-xl bg-indigo-50 text-indigo-600"><i data-lucide="database" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Всего объявлений</p>
                    <h3 id="statTotal" class="text-2xl font-bold text-slate-900 mt-0.5">0</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs flex items-center gap-4">
                <div class="p-3 rounded-xl bg-emerald-50 text-emerald-600"><i data-lucide="check-check" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Перенесутся полностью</p>
                    <h3 id="statSuccess" class="text-2xl font-bold text-slate-900 mt-0.5">0</h3>
                    <p id="statSuccessPct" class="text-xs text-emerald-600 font-medium mt-0.5">0% от всех</p>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs flex items-center gap-4">
                <div class="p-3 rounded-xl bg-amber-50 text-amber-600"><i data-lucide="scissors" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Срез доп. заголовка</p>
                    <h3 id="statCut" class="text-2xl font-bold text-slate-900 mt-0.5">0</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-100 shadow-xs flex items-center gap-4">
                <div class="p-3 rounded-xl bg-rose-50 text-rose-600"><i data-lucide="alert-triangle" class="w-6 h-6"></i></div>
                <div>
                    <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Потеряется УТП</p>
                    <h3 id="statLoss" class="text-2xl font-bold text-slate-900 mt-0.5">0</h3>
                </div>
            </div>
        </section>

        <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-xs mb-4 flex flex-col lg:flex-row justify-between items-stretch lg:items-center gap-4">
            <div class="flex flex-wrap gap-2" id="filterContainer">
                <button data-filter="all" class="filter-btn bg-indigo-600 text-white shadow-xs font-medium py-2 px-4 rounded-xl text-sm transition-all cursor-pointer">Все</button>
                <button data-filter="success" class="filter-btn bg-slate-100 text-slate-600 hover:bg-slate-200 font-medium py-2 px-4 rounded-xl text-sm transition-all cursor-pointer">Перенесутся</button>
                <button data-filter="lost-safe" class="filter-btn bg-slate-100 text-slate-600 hover:bg-slate-200 font-medium py-2 px-4 rounded-xl text-sm transition-all cursor-pointer">Срез доп. заголовка</button>
                <button data-filter="lost-utp" class="filter-btn bg-slate-100 text-slate-600 hover:bg-slate-200 font-medium py-2 px-4 rounded-xl text-sm transition-all cursor-pointer">Потеряется УТП из доп. заголовка</button>
                <button class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium transition-all bg-slate-100 text-slate-600 hover:bg-slate-200 cursor-pointer" data-filter="has-t2">Есть доп. заголовок</button>
            </div>
            <div class="flex items-center gap-3 lg:max-w-md w-full">
                <div class="relative w-full">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="tableSearch" placeholder="Поиск по текстам объявлений..." class="w-full bg-slate-50 pl-10 pr-4 py-2.5 rounded-xl text-sm border border-slate-200 focus:outline-hidden focus:border-indigo-500 focus:bg-white transition-all">
                </div>
                <div id="tableCounter" class="text-xs font-mono font-bold bg-slate-100 text-slate-500 py-2.5 px-3 rounded-xl border border-slate-200 whitespace-nowrap">Строк: 0</div>
            </div>
        </div>

        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto max-h-[650px] overflow-y-auto">
                <table class="w-full text-left border-collapse text-sm whitespace-nowrap">
                    <thead>
                        <tr id="tableHeaderRow" class="border-b border-slate-200 text-xs font-bold uppercase tracking-wider select-none"></tr>
                    </thead>
                    <tbody id="resultsTableBody" class="divide-y divide-slate-100">
                        <tr>
                            <td class="py-16 text-center text-slate-400" colspan="4">
                                <label for="excelFile" class="flex flex-col items-center gap-3 cursor-pointer hover:text-indigo-600 transition-colors">
                                    <i data-lucide="file-spreadsheet" class="w-10 h-10 text-slate-300"></i>
                                    <span>Загрузите файл с кампанией Яндекс Директа в формате XLSX, XLS для инициализации проверки</span>
                                </label>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div id="liveCharCounter" class="fixed z-50 bg-slate-900 text-white px-2.5 py-1 text-xs font-mono rounded-md shadow-lg pointer-events-none font-bold hidden">Длина: 0 симв.</div>
   <div id="titleTooltip" class="fixed hidden z-50 bg-slate-900 text-white text-xs px-3 py-2 rounded-lg shadow-xl max-w-xs pointer-events-none transition-opacity duration-150 border border-slate-700/50"></div>
<script src="app.js"></script>
</body>
</html>
